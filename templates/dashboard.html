{% extends "base.html" %}

{% block content %}
<h2>Dashboard</h2>
<div class="row mt-4">
    <div class="col-md-4">
        <div class="card text-center">
            <div class="card-body">
                <h3>{{ total }}</h3>
                <p>Total Customers</p>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card text-center">
            <div class="card-body">
                <h3 class="text-danger">{{ churned }}</h3>
                <p>Predicted Churn</p>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card text-center">
            <div class="card-body">
                <h3>{{ "%.1f"|format(churn_rate) }}%</h3>
                <p>Churn Rate</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
