{% extends "base.html" %}

{% block content %}
<div class="text-center" style="margin-top: 100px;">
    <h1>🏦 Welcome to Bank Churn Prediction System</h1>
    <p class="lead">Predict which customers are likely to leave and take proactive action</p>
    
    {% if not current_user.is_authenticated %}
    <div class="mt-4">
        <a href="/login" class="btn btn-primary btn-lg">Login</a>
        <a href="/register" class="btn btn-success btn-lg">Register</a>
    </div>
    {% else %}
    <div class="mt-4">
        <a href="/dashboard" class="btn btn-primary btn-lg">Go to Dashboard</a>
        <a href="/predict" class="btn btn-info btn-lg">Make Prediction</a>
    </div>
    {% endif %}
</div>
{% endblock %}
